steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/fiscalia-backend/fiscalia-backend:$COMMIT_SHA
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/fiscalia-backend/fiscalia-backend:$COMMIT_SHA

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - fiscalia-backend
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/fiscalia-backend/fiscalia-backend:$COMMIT_SHA
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/fiscalia-backend/fiscalia-backend:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

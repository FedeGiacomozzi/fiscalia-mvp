<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FiscalIA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: #2d3748;
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header span { font-size: 1.5rem; }

    main { max-width: 680px; margin: 0 auto; padding: 1.5rem; }

    /* ── Capture card ── */
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #4a5568; }

    .capture-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    #preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 8px;
      border: 2px dashed #cbd5e0;
      display: none;
    }

    .placeholder {
      width: 100%;
      height: 160px;
      border: 2px dashed #cbd5e0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #a0aec0;
      font-size: 0.9rem;
      gap: 0.5rem;
    }
    .placeholder svg { width: 40px; height: 40px; }

    /* hidden real input */
    #fileInput { display: none; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #4299e1; color: #fff; }
    .btn-primary:not(:disabled):hover { opacity: .88; }
    .btn-success { background: #48bb78; color: #fff; }
    .btn-success:not(:disabled):hover { opacity: .88; }

    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

    /* ── Loader ── */
    .loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 0;
      color: #718096;
      font-size: 0.9rem;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ── */
    .result { display: none; }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 420px) { .result-grid { grid-template-columns: 1fr; } }

    .field {
      background: #f7fafc;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }
    .field-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #718096;
      margin-bottom: 0.2rem;
    }
    .field-value { font-size: 1rem; font-weight: 600; color: #2d3748; }
    .field-value.monto { color: #2f855a; font-size: 1.15rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      background: #ebf8ff;
      color: #2b6cb0;
    }

    .error-msg {
      display: none;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #c53030;
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    /* ── Dashboard ── */
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .dashboard-header h2 { font-size: 1rem; font-weight: 600; color: #4a5568; }

    #facturasList { display: flex; flex-direction: column; gap: 0.6rem; }

    .factura-item {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      padding: 0.9rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .factura-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .factura-proveedor { font-weight: 700; font-size: 0.95rem; }
    .factura-meta { font-size: 0.78rem; color: #718096; }
    .factura-monto { font-weight: 700; font-size: 1rem; color: #2f855a; white-space: nowrap; }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #a0aec0;
      font-size: 0.9rem;
    }

    .db-loading {
      text-align: center;
      padding: 1.5rem;
      color: #a0aec0;
      font-size: 0.88rem;
    }
  </style>
</head>
<body>

<header>
  <span>🧾</span>
  <h1>FiscalIA</h1>
</header>

<main>

  <!-- ── Capture + Process ── -->
  <div class="card">
    <h2>Cargar factura</h2>
    <div class="capture-area">

      <div class="placeholder" id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/>
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/>
        </svg>
        <span>Ninguna imagen seleccionada</span>
      </div>

      <img id="preview" alt="Vista previa de la factura" />

      <!-- Real file/camera input -->
      <input type="file" id="fileInput" accept="image/*" capture="environment" />

      <div class="btn-row">
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
          📷 Tomar foto / Seleccionar imagen
        </button>
        <button class="btn btn-success" id="processBtn" disabled onclick="procesarFactura()">
          ✨ Procesar con IA
        </button>
      </div>
    </div>

    <!-- Loader -->
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span>Analizando factura con IA…</span>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- Result -->
    <div class="result" id="result" style="margin-top:1.25rem;">
      <div class="result-grid">
        <div class="field">
          <div class="field-label">Proveedor</div>
          <div class="field-value" id="r-proveedor">—</div>
        </div>
        <div class="field">
          <div class="field-label">Monto total</div>
          <div class="field-value monto" id="r-monto">—</div>
        </div>
        <div class="field">
          <div class="field-label">Fecha</div>
          <div class="field-value" id="r-fecha">—</div>
        </div>
        <div class="field">
          <div class="field-label">N° Factura</div>
          <div class="field-value" id="r-numero">—</div>
        </div>
        <div class="field">
          <div class="field-label">Tipo</div>
          <div class="field-value" id="r-tipo">—</div>
        </div>
        <div class="field">
          <div class="field-label">IVA</div>
          <div class="field-value" id="r-iva">—</div>
        </div>
        <div class="field" style="grid-column: span 2;">
          <div class="field-label">Categoría</div>
          <div class="field-value" id="r-categoria">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Dashboard ── -->
  <div class="card">
    <div class="dashboard-header">
      <h2>Facturas procesadas</h2>
    </div>
    <div id="facturasList">
      <div class="db-loading">Cargando…</div>
    </div>
  </div>

</main>

<!-- Firebase JS SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // ── Firebase config ──────────────────────────────────────────────────
  // Reemplazá los valores con los de tu proyecto en Firebase Console
  // (Project settings > General > Your apps > Web app config)
  const firebaseConfig = {
    apiKey:            "REEMPLAZAR_CON_TU_API_KEY",
    authDomain:        "fiscalia-mvp.firebaseapp.com",
    projectId:         "fiscalia-mvp",
    storageBucket:     "fiscalia-mvp.appspot.com",
    messagingSenderId: "REEMPLAZAR_CON_SENDER_ID",
    appId:             "REEMPLAZAR_CON_APP_ID",
  };

  const BACKEND_URL = "https://fiscalia-backend-405077528314.southamerica-east1.run.app/procesar-factura";

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── Image preview ────────────────────────────────────────────────────
  const fileInput   = document.getElementById("fileInput");
  const preview     = document.getElementById("preview");
  const placeholder = document.getElementById("placeholder");
  const processBtn  = document.getElementById("processBtn");

  fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
    placeholder.style.display = "none";
    processBtn.disabled = false;
    hideResult();
  });

  // ── Process ──────────────────────────────────────────────────────────
  async function procesarFactura() {
    const file = fileInput.files[0];
    if (!file) return;

    showLoader(true);
    hideResult();
    hideError();
    processBtn.disabled = true;

    const formData = new FormData();
    formData.append("imagen", file);

    try {
      const res = await fetch(BACKEND_URL, { method: "POST", body: formData });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: `Error HTTP ${res.status}` }));
        throw new Error(err.detail || `Error HTTP ${res.status}`);
      }

      const data = await res.json();
      renderResult(data);
      loadFacturas();          // refresh list
    } catch (e) {
      showError(e.message);
    } finally {
      showLoader(false);
      processBtn.disabled = false;
    }
  }

  function renderResult(d) {
    const fmt = (n) => n != null
      ? new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" }).format(n)
      : "—";

    document.getElementById("r-proveedor").textContent = d.proveedor  || "—";
    document.getElementById("r-monto").textContent     = fmt(d.monto_total);
    document.getElementById("r-fecha").textContent     = d.fecha       || "—";
    document.getElementById("r-numero").textContent    = d.numero_factura || "—";
    document.getElementById("r-tipo").innerHTML        = d.tipo
      ? `<span class="badge">Factura ${d.tipo}</span>` : "—";
    document.getElementById("r-iva").textContent       = fmt(d.iva_monto);
    document.getElementById("r-categoria").textContent = d.categoria   || "—";

    document.getElementById("result").style.display = "block";
  }

  function showLoader(on) {
    document.getElementById("loader").style.display = on ? "flex" : "none";
  }
  function hideResult() {
    document.getElementById("result").style.display = "none";
  }
  function showError(msg) {
    const el = document.getElementById("errorMsg");
    el.textContent = "⚠️ " + msg;
    el.style.display = "block";
  }
  function hideError() {
    document.getElementById("errorMsg").style.display = "none";
  }

  // ── Dashboard ────────────────────────────────────────────────────────
  function loadFacturas() {
    const list = document.getElementById("facturasList");

    db.collection("facturas")
      .orderBy("timestamp", "desc")
      .limit(50)
      .onSnapshot(
        (snapshot) => {
          if (snapshot.empty) {
            list.innerHTML = '<div class="empty-state">Todavía no hay facturas procesadas.</div>';
            return;
          }
          list.innerHTML = "";
          snapshot.forEach((doc) => {
            const d = doc.data();
            const monto = d.monto_total != null
              ? new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" }).format(d.monto_total)
              : "—";
            const fecha = d.fecha || (d.timestamp?.toDate
              ? d.timestamp.toDate().toLocaleDateString("es-AR")
              : "—");

            const item = document.createElement("div");
            item.className = "factura-item";
            item.innerHTML = `
              <div class="factura-left">
                <span class="factura-proveedor">${esc(d.proveedor || "Sin proveedor")}</span>
                <span class="factura-meta">
                  ${esc(fecha)} &nbsp;·&nbsp; ${esc(d.numero_factura || "—")}
                  &nbsp;·&nbsp; <strong>${esc(d.categoria || "—")}</strong>
                  ${d.tipo ? `&nbsp;·&nbsp; <span class="badge">Fact. ${esc(d.tipo)}</span>` : ""}
                </span>
              </div>
              <span class="factura-monto">${monto}</span>
            `;
            list.appendChild(item);
          });
        },
        (err) => {
          list.innerHTML = `<div class="empty-state">Error al cargar facturas: ${esc(err.message)}</div>`;
        }
      );
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Start live dashboard
  loadFacturas();
</script>
</body>
</html>
